# =============================================================================
# Continuous Integration for mbaigo systems
# -----------------------------------------------------------------------------
# This repo contains 34 independent Arrowhead systems, each its own Go module
# that pins a released version of github.com/sdoque/mbaigo. CI here is the
# only place that exercises the real mbaigo API surface against real consumers,
# so a green build here is the signal that an mbaigo bump did not break the
# fleet.
#
# Four jobs:
#   1. lint       — gofmt + go vet, every system  (every push/PR)
#   2. test       — `go test .`, every system     (every push/PR)
#   3. spellcheck — typos in code, comments, docs (every push/PR)
#   4. build-rpi  — cross-compile all 34 systems for Raspberry Pi 4/5 arm64
#                   (tag pushes only — too heavy to run on every commit)
# =============================================================================

name: CI

# -----------------------------------------------------------------------------
# Triggers
# -----------------------------------------------------------------------------
# - push to main           : commits landing on main
# - push tags matching v*  : release tags; this is what gates the heavy
#                            cross-compile job
# - pull_request           : every PR, so reviewers see green/red before merge
# - workflow_dispatch      : manual "Run workflow" button in the Actions UI
# -----------------------------------------------------------------------------
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# -----------------------------------------------------------------------------
# Least-privilege token
# -----------------------------------------------------------------------------
# Default GITHUB_TOKEN can write to the repo; we only need to read source.
# A job that needs to write (e.g. attach release artefacts) must opt in.
# -----------------------------------------------------------------------------
permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: lint — gofmt + go vet across every system
  # ---------------------------------------------------------------------------
  # `make lint` loops over the SYSTEMS list and runs gofmt + go vet in each.
  # Because each system is its own module, go vet pulls that system's deps
  # (including mbaigo) from the module proxy — no workspace required.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      # The repo has no top-level go.mod, so setup-go cannot read a version
      # from it. Pick any system's go.mod as the reference — they all pin
      # the same Go version.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: thermostat/go.mod

      - name: Run linters
        run: make lint

  # ---------------------------------------------------------------------------
  # Job 2: test — unit tests for every system
  # ---------------------------------------------------------------------------
  # Kept separate from lint so a lint failure does not hide a test failure.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: thermostat/go.mod

      - name: Run tests
        run: make test

  # ---------------------------------------------------------------------------
  # Job 3: spellcheck — typos in code, comments, and docs
  # ---------------------------------------------------------------------------
  # No Go toolchain needed. Add a typos.toml at the repo root to whitelist
  # domain terms as they come up.
  # ---------------------------------------------------------------------------
  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run typos
        uses: crate-ci/typos@v1.29.7

  # ---------------------------------------------------------------------------
  # Job 4: build-rpi — cross-compile all 34 systems for Raspberry Pi arm64
  # ---------------------------------------------------------------------------
  # Gated to tag pushes so we do not pay ~1–2 min of cross-compile time on
  # every commit. A failure here means a system no longer builds for the
  # target, which must be fixed before a release goes out.
  #
  # STAGING is overridden to keep the binaries inside the workspace rather
  # than writing to $HOME/go/src/... (the Makefile default, which only makes
  # sense on the developer machine).
  # ---------------------------------------------------------------------------
  build-rpi:
    name: Cross-compile (Raspberry Pi arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: thermostat/go.mod

      # Pass the tag name (e.g. v1.2.3) as VERSION so the binary's
      # -ldflags stamp matches the release.
      - name: Cross-compile fleet
        run: make rpi STAGING=$GITHUB_WORKSPACE/dist VERSION=${GITHUB_REF_NAME}
