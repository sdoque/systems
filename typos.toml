# =============================================================================
# Configuration for the `typos` spellchecker
# -----------------------------------------------------------------------------
# Picked up automatically by the `typos` CLI and by the crate-ci/typos GitHub
# Action when placed at the repo root.
#
# When CI flags a domain term (sensor name, protocol acronym, Arrowhead term)
# as a typo, add a line under [default.extend-words] in this shape:
#
#     CorrectWord = "CorrectWord"
#
# Matching is case-insensitive, so one entry covers every casing.
# =============================================================================

# -----------------------------------------------------------------------------
# Paths excluded from spellchecking
# -----------------------------------------------------------------------------
# WAGO PLC Structured Text files are vendor-format exports, not prose or Go
# code we maintain. The typos (e.g. "Transfered", "connetion") are baked into
# PLC variable names that the runtime and Modbus mapping reference by exact
# spelling — renaming them would break the deployed controller.
# -----------------------------------------------------------------------------
[files]
extend-exclude = ["modboss/plc/"]

[default.extend-words]

# Eclipse Mosquitto — the MQTT broker product. Flagged by typos as if it were
# a misspelling of "mosquito".
Mosquitto = "Mosquitto"

# AAS — Asset Administration Shell (Industry 4.0 / Platform Industrie 4.0).
# The three-letter acronym clashes with the dictionary word "ass".
AAS = "AAS"

# OT — Operational Technology. Standard industrial-automation term used in
# the authorizer specs and architectural prose. The dictionary otherwise
# flags it as a misspelling of TO/OF/OR/NOT.
OT = "OT"

# "unmarshaling" — the canonical Go spelling. Go's standard library uses
# `json.Unmarshal` (single L), and the verb form follows: "unmarshaling".
# The typos dictionary prefers the British "unmarshalling" (double L), but
# changing our prose to disagree with `go doc encoding/json` would be more
# confusing than the spellchecker's preference.
unmarshaling = "unmarshaling"
